name: Fuzzer Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      fuzz_time:
        description: 'Fuzzing time (seconds)'
        required: false
        default: '60'
        type: string

env:
  BUILD_DIR: build
  LLVM_VERSION: "22"

concurrency:
  group: fuzzer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Compiler
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-${{ env.LLVM_VERSION }} llvm-${{ env.LLVM_VERSION }}-dev clang-${{ env.LLVM_VERSION }}

      - name: Configure CMake
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --build . -j$(nproc)

      - name: Verify build
        run: |
          test -f ${{ env.BUILD_DIR }}/xvr && echo "Build successful" || exit 1
          test -f ${{ env.BUILD_DIR }}/src/libxvr.a && echo "Static library built" || exit 1

  fuzz-test:
    name: Fuzzing Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-${{ env.LLVM_VERSION }} llvm-${{ env.LLVM_VERSION }}-dev

      - name: Build
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Run fuzzing test suite
        run: |
          chmod +x fuzzer/fuzz_test_suite.sh
          FUZZ_XVR_PATH="${{ env.BUILD_DIR }}/xvr" ./fuzzer/fuzz_test_suite.sh

      - name: Generate fuzzing report
        if: always()
        run: |
          echo "## Fuzzing Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All fuzzing tests completed successfully." >> $GITHUB_STEP_SUMMARY

  regression-test:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-${{ env.LLVM_VERSION }} llvm-${{ env.LLVM_VERSION }}-dev

      - name: Build
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Run regression tests
        run: |
          chmod +x test/regression_tests.sh
          REGRESSION_XVR_PATH="${{ env.BUILD_DIR }}/xvr" ./test/regression_tests.sh

      - name: Generate regression report
        if: always()
        run: |
          echo "## Regression Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All regression tests passed." >> $GITHUB_STEP_SUMMARY

  corpus-test:
    name: Corpus Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-${{ env.LLVM_VERSION }} llvm-${{ env.LLVM_VERSION }}-dev

      - name: Build
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Test corpus files
        run: |
          if [ -d fuzzer/corpus ]; then
            echo "Testing corpus files..."
            PASSED=0
            FAILED=0
            for f in fuzzer/corpus/*.xvr; do
              if [ -f "$f" ]; then
                if timeout 5 ${{ env.BUILD_DIR }}/xvr "$f" >/dev/null 2>&1; then
                  PASSED=$((PASSED + 1))
                else
                  EXIT_CODE=$?
                  if [ $EXIT_CODE -eq 1 ]; then
                    echo "Expected failure (syntax error): $f"
                  else
                    echo "Unexpected failure: $f (exit $EXIT_CODE)"
                    FAILED=$((FAILED + 1))
                  fi
                fi
              fi
            done
            echo "Corpus tests: $PASSED passed, $FAILED unexpected failures"
          fi

  stress-test:
    name: Stress Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-${{ env.LLVM_VERSION }} llvm-${{ env.LLVM_VERSION }}-dev

      - name: Build
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Run stress tests
        run: |
          echo "Running stress tests..."
          
          for i in $(seq 1 100); do
            echo "proc p${i}(a${i}: int): int { return a${i} + ${i}; } p${i}(${i});" > /tmp/stress_$i.xvr
          done
          
          for f in /tmp/stress_*.xvr; do
            timeout 5 ${{ env.BUILD_DIR }}/xvr "$f" >/dev/null 2>&1 || echo "Failed: $f"
          done
          
          rm -f /tmp/stress_*.xvr
          
          echo "Stress tests completed"

      - name: Run edge case tests
        run: |
          echo "Running edge case tests..."
          
          for depth in 5 10 20 50; do
            parens=$(printf '(((((%s)))));' "$(printf '%.0s(' $(seq 1 $depth))" | head -c $((depth * 2)))
            echo "std::print(${parens}42" > /tmp/nest_$depth.xvr
            timeout 5 ${{ env.BUILD_DIR }}/xvr /tmp/nest_$depth.xvr >/dev/null 2>&1 || echo "Nested $depth failed"
          done
          
          for len in 100 500 1000; do
            str=$(printf 'a%.0s' $(seq 1 $len))
            echo "std::print(\"$str\");" > /tmp/long_$len.xvr
            timeout 5 ${{ env.BUILD_DIR }}/xvr /tmp/long_$len.xvr >/dev/null 2>&1 || echo "Long string $len failed"
          done
          
          rm -f /tmp/nest_*.xvr /tmp/long_*.xvr
          
          echo "Edge case tests completed"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [fuzz-test, regression-test, corpus-test, stress-test]
    
    steps:
      - name: Summary
        run: |
          echo "## Fuzzer CI Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All fuzzer tests passed:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Fuzzing Tests | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Regression Tests | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Corpus Tests | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Stress Tests | Passed |" >> $GITHUB_STEP_SUMMARY
