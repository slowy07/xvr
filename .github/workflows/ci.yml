name: XVR CI

on:
  push:
    branches: [main, ]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22 llvm-22-dev clang-22

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_C_COMPILER=clang-22 \
            -DXVR_BUILD_TESTS=ON \
            -DXVR_BUILD_TYPE=release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure --timeout 60

      - name: Test Compiler
        run: |
          ./build/bin/xvr --version

  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          winget install LLVM.LLVM --version 18.1.8 --silent --accept-package-agreements --accept-source-agreements

      - name: Configure CMake
        shell: pwsh
        run: |
          $env:Path = "C:\Program Files\LLVM\bin;$env:Path"
          mkdir build
          cd build
          cmake .. -G "Ninja" -DXVR_BUILD_TESTS=ON -DXVR_BUILD_TYPE=release

      - name: Build
        shell: pwsh
        run: |
          $env:Path = "C:\Program Files\LLVM\bin;$env:Path"
          cmake --build build -j$env:NUMBER_OF_PROCESSORS

      - name: Run Tests
        shell: pwsh
        run: |
          $env:Path = "C:\Program Files\LLVM\bin;$env:Path"
          cd build
          ctest --output-on-failure --timeout 60

  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          brew install llvm@18
          echo "LLVM_PATH=$(brew --prefix llvm@18)" >> $GITHUB_ENV
          echo "/opt/homebrew/opt/llvm@18/bin" >> $GITHUB_PATH

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DXVR_BUILD_TESTS=ON \
            -DXVR_BUILD_TYPE=release

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure --timeout 60

  format-check:
    runs-on: ubuntu-latest
    needs: build-linux
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find . -type f \( -name "*.c" -o -name "*.h" \) ! -path "./build/*" | while IFS= read -r file; do
            if ! clang-format --dry-run -Werror "$file"; then
              echo "Not formatted: $file"
              exit 1
            fi
          done
