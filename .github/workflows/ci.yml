name: testing xvr programming lang

on: [push, pull_request]

jobs:
  test-ubuntu-latest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-21 llvm-21-dev

      - name: find C source files
        run: find . -type f \( -name "*.c" -o -name "*.h" \) > c_files.txt
        
      - name: check formatting
        run: |
          while IFS= read - r file; do
            if ! clang-format --dry-run -Werror "$file"; then
              echo "not formatted: $file"
              exit 1
            fi
          done < c_files.txt
        shell: bash

      - name: testing
        run: |
          make test

  test-windows-latest:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: |
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-clang-tools-extra
            mingw-w64-x86_64-llvm

      - name: Build and test
        run: |
          make test
